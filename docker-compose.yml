# common-config for all agents to avoid repetition
x-linda-base: &linda-base
  build:
    context: .
    dockerfile: Dockerfile
  restart: always
  logging:
    driver: "json-file"
    options:
      max-size: "50m"

services:
  # ---------------------------------------------------------
  # Firm Provisioner
  # ---------------------------------------------------------
  # Vercel calls this service after /api/admin/firms creates a company.
  # It runs ./add-firm.sh <firmId> inside this repo and can update
  # docker-compose.yml for the per-firm Linda agent.
  linda-provisioner:
    build:
      context: .
      dockerfile: Dockerfile.provisioner
    container_name: linda-provisioner
    restart: always
    working_dir: ${LINDA_REPO_DIR:-/workspace}
    environment:
      PROVISION_PORT: 3037
      PROVISION_SHARED_SECRET: ${PROVISION_SHARED_SECRET:-}
      AUTO_START: ${AUTO_START:-1}
    ports:
      - "3037:3037"
    volumes:
      - ${LINDA_REPO_DIR:-.}:${LINDA_REPO_DIR:-/workspace}
      - /var/run/docker.sock:/var/run/docker.sock

# Firm services are generated into docker-compose.override.yml by add-firm.sh.
# Keep this tracked file free of per-firm runtime state so git pull stays clean.
