version: '3.8'

# common-config for all agents to avoid repetition
x-linda-base: &linda-base
  build:
    context: .
    dockerfile: Dockerfile
  restart: always
  logging:
    driver: "json-file"
    options:
      max-size: "50m"

services:
  # ---------------------------------------------------------
  # Firm Provisioner
  # ---------------------------------------------------------
  # Vercel calls this service after /api/admin/firms creates a company.
  # It runs ./add-firm.sh <firmId> inside this repo and can update
  # docker-compose.yml for the per-firm Linda agent.
  linda-provisioner:
    build:
      context: .
      dockerfile: Dockerfile.provisioner
    container_name: linda-provisioner
    restart: always
    working_dir: /workspace
    environment:
      PROVISION_PORT: 3037
      PROVISION_SHARED_SECRET: ${PROVISION_SHARED_SECRET:-}
      AUTO_START: ${AUTO_START:-1}
    ports:
      - "3037:3037"
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock

  # ---------------------------------------------------------
  # FIRM: Alpha Clinic
  # ---------------------------------------------------------
  linda-alpha:
    <<: *linda-base
    container_name: linda-alpha
    volumes:
      # WhatsApp session persistence
      - ./firms/alpha/wa-auth:/app/packages/linda-agent/data/wa-auth
      # Unique environment variables for this firm
      - ./firms/alpha/.env:/app/packages/linda-agent/.env
    ports:
      - "3034:3034"

  # ---------------------------------------------------------
  # FIRM: Beta Dental
  # ---------------------------------------------------------
  linda-beta:
    <<: *linda-base
    container_name: linda-beta
    volumes:
      - ./firms/beta/wa-auth:/app/packages/linda-agent/data/wa-auth
      - ./firms/beta/.env:/app/packages/linda-agent/.env
    # ports:
    #   - "3035:3034"

# Note: Before starting, create the folders:
# mkdir -p firms/alpha/wa-auth firms/beta/wa-auth
# And place your .env files in firms/alpha/.env etc.
